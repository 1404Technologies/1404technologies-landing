<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for top cylinder - bright blue -->
    <linearGradient id="d_cylTopBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="d_cylTopCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <!-- Gradient for left cylinder - blue -->
    <linearGradient id="d_cylLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="d_cylLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Gradient for right cylinder - blue -->
    <linearGradient id="d_cylRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="d_cylRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Gradient for bottom cylinder - teal/cyan -->
    <linearGradient id="d_cylBottomBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="50%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="d_cylBottomCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="50%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <!-- Line gradients - brighter for dark bg -->
    <linearGradient id="d_lineGradTopLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="d_lineGradTopRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="d_lineGradBottomLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="d_lineGradBottomRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <!-- Center diamond gradient -->
    <linearGradient id="d_centerDiamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connecting lines forming diamond shape -->
  <line x1="200" y1="105" x2="100" y2="200" stroke="url(#d_lineGradTopLeft)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="200" y1="105" x2="300" y2="200" stroke="url(#d_lineGradTopRight)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="100" y1="200" x2="200" y2="295" stroke="url(#d_lineGradBottomLeft)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="300" y1="200" x2="200" y2="295" stroke="url(#d_lineGradBottomRight)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Inner cross lines to center -->
  <line x1="200" y1="130" x2="200" y2="180" stroke="#42A5F5" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="130" y1="200" x2="180" y2="200" stroke="#1E88E5" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="220" y1="200" x2="270" y2="200" stroke="#2196F3" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="200" y2="270" stroke="#26A69A" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center diamond shape -->
  <polygon points="200,172 228,200 200,228 172,200" fill="none" stroke="url(#d_centerDiamondGrad)" stroke-width="5" filter="url(#glow)"/>
  <polygon points="200,183 217,200 200,217 183,200" fill="#64B5F6"/>

  <!-- Top cylinder -->
  <g transform="translate(200, 80)">
    <ellipse cx="0" cy="22" rx="30" ry="11" fill="#1565C0"/>
    <rect x="-30" y="-2" width="60" height="24" fill="url(#d_cylTopBody)"/>
    <ellipse cx="0" cy="-2" rx="30" ry="11" fill="url(#d_cylTopCap)"/>
  </g>

  <!-- Left cylinder -->
  <g transform="translate(80, 200)">
    <ellipse cx="0" cy="22" rx="30" ry="11" fill="#0D47A1"/>
    <rect x="-30" y="-2" width="60" height="24" fill="url(#d_cylLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="30" ry="11" fill="url(#d_cylLeftCap)"/>
  </g>

  <!-- Right cylinder -->
  <g transform="translate(320, 200)">
    <ellipse cx="0" cy="22" rx="30" ry="11" fill="#0D47A1"/>
    <rect x="-30" y="-2" width="60" height="24" fill="url(#d_cylRightBody)"/>
    <ellipse cx="0" cy="-2" rx="30" ry="11" fill="url(#d_cylRightCap)"/>
  </g>

  <!-- Bottom cylinder -->
  <g transform="translate(200, 295)">
    <ellipse cx="0" cy="22" rx="30" ry="11" fill="#004D40"/>
    <rect x="-30" y="-2" width="60" height="24" fill="url(#d_cylBottomBody)"/>
    <ellipse cx="0" cy="-2" rx="30" ry="11" fill="url(#d_cylBottomCap)"/>
  </g>
</svg>
